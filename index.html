<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEEYOO_OS</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --green: #00ff41; --bg: #000; --dim: #003b11; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg); color: var(--green);
            font-family: 'VT323', monospace; margin: 0; padding: 0;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* Декор углов как в визоре хакера */
        .corner { position: fixed; width: 20px; height: 20px; border: 2px solid var(--green); z-index: 100; }
        .top-l { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
        .top-r { top: 10px; right: 10px; border-left: 0; border-bottom: 0; }
        .bot-l { bottom: 10px; left: 10px; border-right: 0; border-top: 0; }
        .bot-r { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }

        /* Шапка с именем */
        header {
            text-align: center; padding: 25px 10px 10px;
            background: linear-gradient(to bottom, var(--dim), transparent);
        }
        .user-id { font-size: 16px; letter-spacing: 5px; opacity: 0.7; }
        .user-name { font-size: 50px; margin: 0; text-shadow: 0 0 15px var(--green); }

        /* Главный дисплей текущей задачи */
        .active-window {
            margin: 10px; border: 1px solid var(--green);
            background: rgba(0, 255, 65, 0.05); padding: 15px;
        }
        .clock { font-size: 38px; text-align: center; border-bottom: 1px solid var(--dim); margin-bottom: 10px; }
        .label { font-size: 14px; opacity: 0.6; }
        .task-now { font-size: 24px; color: #fff; text-shadow: 0 0 5px var(--green); min-height: 50px; display: flex; align-items: center; }

        /* Список задач - адаптирован под свайп */
        .task-list {
            flex-grow: 1; overflow-y: auto; padding: 10px;
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }
        .task-row {
            display: grid; grid-template-columns: 60px 1fr;
            padding: 15px 5px; border-bottom: 1px solid var(--dim);
            font-size: 20px; transition: 0.3s;
        }
        .task-row.active { background: var(--green); color: #000; font-weight: bold; transform: scale(1.02); }
        .task-row.past { opacity: 0.2; }

        /* Кнопка управления */
        .control-panel { padding: 15px 20px 25px; }
        .btn-main {
            width: 100%; padding: 18px; background: var(--green); color: #000;
            border: none; font-family: inherit; font-size: 24px; font-weight: bold;
            box-shadow: 0 0 20px var(--green);
        }

        /* Анимация загрузки */
        .scanline {
            width: 100%; height: 2px; background: var(--green);
            position: fixed; opacity: 0.1; z-index: 200;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="corner top-l"></div><div class="corner top-r"></div>
    <div class="corner bot-l"></div><div class="corner bot-r"></div>

    <header>
        <div class="user-id">IDENT_SYSTEM:</div>
        <h1 class="user-name">DEEYOO</h1>
    </header>

    <div class="active-window">
        <div id="clock" class="clock">00:00:00</div>
        <div class="label">CURRENT_OBJECTIVE:</div>
        <div id="task-active" class="task-now">СИСТЕМА В ОЖИДАНИИ...</div>
    </div>

    <div class="task-list" id="list"></div>

    <div class="control-panel">
        <button id="start-btn" class="btn-main" onclick="startSys()">[ ВКЛЮЧИТЬ ПИТАНИЕ ]</button>
    </div>

<script>
    const protocol = [
        { t: "04:30", n: "ПРОСНУТЬСЯ / ТАХАДЖУД" },
        { t: "05:10", n: "ПОДГОТОВКА К ФАДЖРУ" },
        { t: "05:20", n: "ФАДЖР НАМАЗ" },
        { t: "05:40", n: "ЧТЕНИЕ (УМ / РЕЛИГИЯ)" },
        { t: "06:10", n: "ТРЕНИРОВКА (ТУРНИК)" },
        { t: "07:00", n: "ДУШ + ЗАВТРАК" },
        { t: "07:30", n: "КОДИНГ / АЛГОРИТМЫ" },
        { t: "08:30", n: "УНИВЕРСИТЕТ" },
        { t: "13:10", n: "ЗУХР НАМАЗ" },
        { t: "13:30", n: "ОТДЫХ / POWER NAP" },
        { t: "14:30", n: "C++ / ПРОЕКТЫ" },
        { t: "16:30", n: "ТРЕЙДИНГ / АНАЛИЗ" },
        { t: "17:40", n: "АСР НАМАЗ" },
        { t: "18:00", n: "КНИГИ / TG КАНАЛ" },
        { t: "19:10", n: "МАГРИБ НАМАЗ" },
        { t: "19:30", n: "ЛЕГКИЙ КОД / ПЛАНЫ" },
        { t: "20:30", n: "УЖИН" },
        { t: "21:00", n: "ИША НАМАЗ" },
        { t: "21:20", n: "ЧТЕНИЕ / РАБОТА" },
        { t: "22:30", n: "СОН (SHUTDOWN)" }
    ];

    function draw() {
        document.getElementById('list').innerHTML = protocol.map(p => `
            <div class="task-row" id="row-${p.t.replace(':','')}">
                <div style="opacity:0.6">${p.t}</div>
                <div>${p.n}</div>
            </div>
        `).join('');
    }

    function sync() {
        const d = new Date();
        const now = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
        document.getElementById('clock').innerText = d.toLocaleTimeString();

        let active = protocol[0];
        protocol.forEach(p => {
            const el = document.getElementById('row-' + p.t.replace(':',''));
            if (now >= p.t) {
                el.className = 'task-row past';
                active = p;
            } else {
                el.className = 'task-row';
            }
        });

        const activeRow = document.getElementById('row-' + active.t.replace(':',''));
        activeRow.className = 'task-row active';
        document.getElementById('task-active').innerText = active.n;
        
        // Авто-скролл: держим активную задачу в центре
        activeRow.scrollIntoView({ behavior: 'smooth', block: 'center' });

        if (d.getSeconds() === 0 && protocol.find(p => p.t === now)) {
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        }
    }

    function startSys() {
        if (typeof Notification !== "undefined") Notification.requestPermission();
        document.getElementById('start-btn').style.display = 'none';
        setInterval(sync, 1000);
        sync();
    }

    draw();
</script>
</body>
</html>
